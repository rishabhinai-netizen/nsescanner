name: Market Hours Alert Engine

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: Send test Telegram message only
        required: false
        default: 'false'

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run alert engine (test)
        if: github.event.inputs.test_mode == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python alert_engine.py --test
      - name: Run alert engine
        if: github.event.inputs.test_mode != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREEZE_API_KEY: ${{ secrets.BREEZE_API_KEY }}
          BREEZE_API_SECRET: ${{ secrets.BREEZE_API_SECRET }}
          BREEZE_SESSION_TOKEN: ${{ secrets.BREEZE_SESSION_TOKEN }}
          ALERT_UNIVERSE: nifty200
        run: python alert_engine.py

